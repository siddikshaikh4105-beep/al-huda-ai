<!DOCTYPE html>
<html>
<head>
  <title>Al-Huda AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial;
      background: #0F3D2E;
      color: white;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: #1F6F78;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
    }
    input {
      padding: 10px;
      width: 80%;
      border-radius: 5px;
      border: none;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      background: #C8A951;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Al-Huda AI 🤖</h1>
<p>Your Islamic Knowledge Companion</p>

<div class="card">
  <h3>Al-Huda AI Chat</h3>

  <div id="chatBox" style="text-align:left; max-height:300px; overflow:auto; margin-bottom:10px;"></div>

  <input id="question" placeholder="Ask about Islam..." />
  <br /><br />
  <button onclick="answer()">Ask</button>
</div>

<script>
function answer() {
  let q = document.getElementById("question").value.toLowerCase();
  let res = "";

  if (q.includes("sabr")) {
    res = "🟢 Sabr (Patience)\n\n📖 Quran 2:153\nAllah sabr karne walon ke saath hai.\n\n💡 Sabr ka matlab strong rehna hai mushkil waqt me.\n\n🔎 Next:\n- Sabr ka reward kya hai?\n- Musibat me kya kare?";
  }

  else if (q.includes("namaz") || q.includes("salah")) {
    res = "🟢 Salah (Namaz)\n\n📖 Quran 2:43\nNamaz establish karo.\n\n💡 Namaz Allah se direct connection hai.\n\n🔎 Next:\n- Namaz ka tareeqa?\n- Khushu kaise laaye?";
  }

  else if (q.includes("zakat")) {
    res = "🟢 Zakat\n\n📖 Quran 9:60\nZakat gareebo ke liye hai.\n\n💡 Ye wealth purification hai.\n\n🔎 Next:\n- Zakat kaise calculate kare?\n- Kis ko dena chahiye?";
  }

  else if (q.includes("roza") || q.includes("fasting")) {
    res = "🟢 Roza (Fasting)\n\n📖 Quran 2:183\nRoza farz kiya gaya.\n\n💡 Self-control aur taqwa ke liye.\n\n🔎 Next:\n- Roza rules kya hain?\n- Roza kab toot jata hai?";
  }

  else if (q.includes("hajj")) {
    res = "🟢 Hajj\n\n📖 Quran 3:97\nHajj farz hai jo afford kare.\n\n💡 Life changing ibadat.\n\n🔎 Next:\n- Hajj steps kya hain?\n- Umrah kya hai?";
  }

  else if (q.includes("allah")) {
    res = "🟢 Allah\n\n📖 Quran 112:1\nAllah ek hai.\n\n💡 Wo creator hai sabka.\n\n🔎 Next:\n- Allah ke 99 naam?\n- Allah ko kaise pehchane?";
  }

  else if (q.includes("prophet") || q.includes("muhammad")) {
    res = "🟢 Prophet Muhammad ﷺ\n\n📖 Quran 33:21\nBest example.\n\n💡 Unki life follow karni chahiye.\n\n🔎 Next:\n- Seerah kya hai?\n- Sunnah kya hai?";
  }

  else if (q.includes("quran")) {
    res = "🟢 Quran\n\n📖 Quran 2:2\nGuidance for mankind.\n\n💡 Allah ka kalam.\n\n🔎 Next:\n- Quran kaise samjhe?\n- Tafsir kya hai?";
  }

  else if (q.includes("hadith")) {
    res = "🟢 Hadith\n\n📖 Sahih Bukhari\nProphet ke sayings.\n\n💡 Islam samajhne ka source.\n\n🔎 Next:\n- Sahih hadith kya hoti hai?\n- Hadith kaise padhe?";
  }

  else if (q.includes("jannah")) {
    res = "🟢 Jannah\n\n📖 Quran 3:133\nJannah believers ke liye hai.\n\n💡 Eternal reward.\n\n🔎 Next:\n- Jannah me kya milega?\n- Kaise milegi?";
  }

  else if (q.includes("jahannam")) {
    res = "🟢 Jahannam\n\n📖 Quran 4:56\nPunishment place.\n\n💡 Gunah se bachna zaroori.\n\n🔎 Next:\n- Kaun jata hai?\n- Kaise bache?";
  }

  else if (q.includes("dua")) {
    res = "🟢 Dua\n\n📖 Quran 40:60\nAllah dua accept karta hai.\n\n💡 Direct connection.\n\n🔎 Next:\n- Dua kab accept hoti hai?\n- Kaunsi best dua hai?";
  }

  else {
    res = "🤲 Ye sawal abhi system me nahi hai.\n\n🔎 Aap ye try kar sakte hain:\n- Sabr\n- Namaz\n- Zakat\n- Quran\n- Hadith\n- Dua\n\nInshaAllah future me aur strong AI banega.";
  }

  let chatBox = document.getElementById("chatBox");

chatBox.innerHTML += "<p><b>You:</b> " + q + "</p>";
chatBox.innerHTML += "<p><b>AI:</b> " + res + "</p>";

document.getElementById("question").value = "";
</script>

</body>
</html>
